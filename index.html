<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Nattress</title>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

.container {
  width: 100%;
  max-width: 720px;   /* ← MASTER WIDTH (video + card both obey this) */
}

.video {
  width: 100%;
  aspect-ratio: 16 / 9;
}

.video iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: block;
}

.card-container {
  position: relative;
  width: 100%;
  margin-top: 32px;
}

.card {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* Invisible clickable areas */
.click {
  position: absolute;
}

/* Adjust these to match card layout */
.linkedin {
  position: absolute;
  left: 36.99%;
  top: 44.45%;
  width: 9.99%;
  height: 4.54%;
}

.email {
  position: absolute;
  left: 36.99%;
  top: 39.12%;
  width: 21.86%;
  height: 2.97%;
}

  
</style>
</head>

<body>

<div class="container">

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Intro video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div class="card-container">

  <img src="business-card.png" alt="Sam Nattress" class="card">

  <!-- LinkedIn clickable area -->
  <a href="https://www.linkedin.com/in/sam-nattress"
     class="click linkedin"
     target="_blank"></a>

  <!-- Email clickable area -->
  <a href="mailto:nattress.sam@gmail.com"
     class="click email"></a>

</div>

</div>



</body>
</html>
