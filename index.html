<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Nattress</title>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

.container {
  width: 100%;
  max-width: 720px;   /* ← MASTER WIDTH (video + card both obey this) */
}

.video {
  width: 100%;
  aspect-ratio: 16 / 9;
}

.video iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: block;
}

.card-container {
  position: relative;
  width: 100%;
  max-width: 720px;   /* same as video */
  margin: 0 auto;
}

.card {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* Invisible clickable areas */
.click {
  position: absolute;
}

/* Adjust these to match card layout */
.linkedin {
  position: absolute;
  left: calc(37% + 7%);
  top: calc(44% + 14.5%);
  width: calc(9.99% + 3%);
  height: 4.54%;
}

.email {
  position: absolute;
  left: calc(37% + 7%);
  top: calc(39.12% + 12.8%);
  width: calc(21.86% + 6%);
  height: calc(2.97% + 0.5%);
}

.email-text {
  color: transparent;     /* hides duplicate text */
  user-select: text;      /* allows copying */
  cursor: text;
}

#copyMessage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 6px;

  opacity: 0;
  pointer-events: none;

  transition: opacity 0.25s ease;
  z-index: 10;
}

#copyMessage.show {
  opacity: 1;
}

  .email:hover::after {
  content: "Click to copy email";
  position: absolute;
  top: -28px;
  left: 0;

  font-size: 12px;
  background: #222;
  color: white;
  padding: 4px 6px;
  border-radius: 4px;
}
  
</style>
</head>

<script>
function copyEmail(event) {

  const email = "nattress.sam@gmail.com";

  if (event.ctrlKey || event.metaKey) {
    window.location.href = "mailto:" + email;
    return;
  }

  navigator.clipboard.writeText(email);

  const msg = document.getElementById("copyMessage");

  msg.classList.add("show");

  setTimeout(() => {
    msg.classList.remove("show");
  }, 1500);

}
</script>
  
<body>

<div class="container">

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Intro video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div class="card-container">

  <img src="business-card.png" alt="Sam Nattress" class="card">

  <!-- LinkedIn clickable area -->
  <a href="https://www.linkedin.com/in/sam-nattress"
     class="click linkedin"
     target="_blank"></a>

  <!-- Email clickable area -->
  <div class="click email" onclick="copyEmail(event)"></div>

  
  <!-- Copy confirmation -->
  <div id="copyMessage">Email copied</div>

</div>

</div>



</body>
</html>
