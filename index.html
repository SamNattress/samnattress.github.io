<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Nattress</title>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

.container {
  width: 100%;
  max-width: 720px;   /* ← MASTER WIDTH (video + card both obey this) */
}

.video {
  width: 100%;
  aspect-ratio: 16 / 9;
}

.video iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: block;
}

.card-link {
  display: block;
  margin-top: 32px;
}

.card-link img {
  width: 100%;        /* ← fills container */
  height: auto;       /* ← keeps proportions */
  display: block;     /* ← removes inline spacing bug */
  border-radius: 12px;
  transition: transform 0.2s ease;
}

.card-link img:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Intro video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <a href="https://www.linkedin.com/in/YOUR-LINKEDIN" target="_blank" class="card-link">
    <img src="business-card.png" alt="Sam Nattress">
  </a>

</div>



</body>
</html>
