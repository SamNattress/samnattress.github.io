<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Nattress</title>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

.container {
  width: 100%;
  max-width: 720px;   /* ← MASTER WIDTH (video + card both obey this) */
}

.video {
  width: 100%;
  aspect-ratio: 16 / 9;
}

.video iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: block;
}

.card-container {
  position: relative;
  width: 100%;
  max-width: 720px;   /* same as video */
  margin: 0 auto;
}

.card {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

/* Invisible clickable areas */
.click {
  position: absolute;
}

/* Adjust these to match card layout */
.linkedin {
  position: absolute;
  left: calc(37% + 7%);
  top: calc(44% + 14.5%);
  width: calc(9.99% + 3%);
  height: 4.54%;
}

.email {
  position: absolute;
  left: calc(37% + 7%);
  top: calc(39.12% + 12.8%);
  width: calc(21.86% + 6%);
  height: calc(2.97% + 0.5%);
}

.email-text {
  color: #000;       /* visible, selectable text */
  user-select: text; /* allows selection */
  pointer-events: auto; /* let pointer interact with the text itself */
}
  
</style>
</head>

<body>

<div class="container">

  <div class="video">
    <iframe
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Intro video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div class="card-container">

  <img src="business-card.png" alt="Sam Nattress" class="card">

  <!-- LinkedIn clickable area -->
  <a href="https://www.linkedin.com/in/sam-nattress"
     class="click linkedin"
     target="_blank"></a>

  <!-- Email clickable area -->
  <a href="mailto:you@email.com" class="click email">
    <span class="email-text">nattress.sam@gmail.com</span>
  </a>

  
  <!-- Selectable Email Text -->
  <div class="email-text">nattress.sam@gmail.com</div>

</div>

</div>



</body>
</html>
