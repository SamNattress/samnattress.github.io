<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sam Nattress</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#f3f3f3;
display:flex;
justify-content:center;
padding:40px 16px;
}

.container{
width:100%;
max-width:720px;
}

/* ---------------- VIDEO ---------------- */

.video{
width:100%;
aspect-ratio:16/9;
margin-bottom:40px;
}

.video iframe{
width:100%;
height:100%;
border-radius:12px;
border:none;
}

/* ---------------- CARD ---------------- */

.card{

background:#eeeeee;
border-radius:12px;
padding:40px;
position:relative;
overflow:hidden;
}

.card-grid{

display:grid;
grid-template-columns:200px 1fr;
gap:40px;
align-items:center;

}

/* headshot */

.headshot{

width:200px;
height:200px;
border-radius:50%;
overflow:hidden;
background:#ddd;
}

.headshot img{

width:100%;
height:100%;
object-fit:cover;

}

/* name */

.name{

font-size:36px;
font-weight:700;
letter-spacing:1px;
margin-bottom:10px;

}

.tagline{

font-size:22px;
color:#444;
margin-bottom:30px;

}

/* contact section */

.contact-title{

font-weight:700;
margin-bottom:10px;

}

.contact-item{

display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
font-size:18px;

}

.contact-item a{

text-decoration:none;
color:#333;

}

.contact-item a:hover{

text-decoration:underline;

}

/* mountains */

.mountains{

position:absolute;
bottom:0;
right:0;
width:260px;
opacity:0.9;

}

/* responsive */

@media(max-width:650px){

.card-grid{

grid-template-columns:1fr;
text-align:center;

}

.headshot{

margin:auto;

}

.mountains{

width:200px;

}

}

</style>
</head>


<body>

<div class="container">

<!-- VIDEO -->

<div class="video">

<iframe
src="https://www.youtube.com/embed/VIDEO_ID"
allowfullscreen>
</iframe>

</div>


<!-- CARD -->

<div class="card">

<div class="card-grid">

<div class="headshot">

<img src="headshot.jpg" alt="Sam Nattress">

</div>


<div>

<div class="name">SAM NATTRESS</div>

<div class="tagline">Growth Marketing / Sustainability</div>

<div class="contact-title">Get in touch:</div>

<div class="contact-item">
📧
<a href="mailto:nattress.sam@gmail.com">
nattress.sam@gmail.com
</a>
</div>

<div class="contact-item">
🔗
<a href="https://www.linkedin.com/in/sam-nattress" target="_blank">
LinkedIn
</a>
</div>

</div>

</div>

<img src="mountains.png" class="mountains">

</div>

</div>

</body>
</html>
